<div class="comments-section mt-4">
  <div
    class="card border-0 rounded-4 mb-4 shadow-sm"
    style="
      background-color: #1b263b;
      border: 1px solid rgba(65, 90, 119, 0.3) !important;
    "
  >
    <div class="card-body p-3">
      @if (error) {
      <div
        class="alert alert-danger py-2 border-0 bg-danger bg-opacity-10 text-danger small mb-3"
      >
        <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
      </div>
      }
      <form (ngSubmit)="onSubmit()" class="position-relative">
        <textarea
          [(ngModel)]="comment"
          name="comment-text"
          class="form-control bg-transparent text-white border-0 p-0 custom-comment-input"
          placeholder="Write a comment..."
          rows="2"
          style="box-shadow: none; resize: none"
        ></textarea>

        <div class="d-flex justify-content-end mt-2">
          <button
            type="submit"
            class="btn btn-info btn-sm rounded-pill px-4 fw-bold shadow-sm"
          >
            <i class="fa-solid fa-paper-plane me-2"></i>SUBMIT
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="comment-list d-flex flex-column gap-3">
    @for (comment of comments; track comment.id) {
    <div class="d-flex gap-3 animate fade-in">
      <div class="flex-shrink-0">
        <div
          class="rounded-circle bg-info bg-opacity-10 border border-info border-opacity-25 d-flex align-items-center justify-content-center text-info fw-bold"
          style="width: 40px; height: 40px; font-size: 0.8rem"
        >
          {{ comment.nickname.substring(0, 2).toUpperCase() }}
        </div>
      </div>

      <div class="flex-grow-1">
        <div
          class="p-3 rounded-4 shadow-sm"
          style="
            background-color: #1b263b;
            border: 1px solid rgba(65, 90, 119, 0.2);
          "
        >
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="text-white fw-bold mb-0 small">
              {{ comment.nickname }}
            </h6>
            <small class="text-info opacity-50" style="font-size: 0.7rem">{{
              dateFormatter(comment.creadAt)
            }}</small>
          </div>
          <div class="text-white-50 small lh-base">
            {{ comment.comment }}
          </div>
        </div>
      </div>
    </div>
    } @empty {
    <div class="text-center py-5 opacity-25">
      <i class="fa-solid fa-comments fs-1 text-info mb-2"></i>
      <p class="text-white small">
        No comments yet. Be the first to join the conversation!
      </p>
    </div>
    }
  </div>
</div>
