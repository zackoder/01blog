<div class="p">
  <button [class.selected]="type === 'post'" (click)="reportsList('post')">
    Reported Posts
  </button>
  <button [class.selected]="type === 'user'" (click)="reportsList('user')">
    Reported Users
  </button>

  <div>
    @if (type === 'post') {
    <app-repoted-posts [(reports)]="reports"></app-repoted-posts>
    } @else {
    <app-repoted-users (reports)="reports()"></app-repoted-users>
    }
  </div>
</div>
