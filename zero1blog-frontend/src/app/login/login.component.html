<div
  class="min-vh-100 d-flex align-items-center justify-content-center py-5"
  style="background-color: #0d1b2a"
>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5 col-xl-4">
        <div class="text-center mb-4 animate-fade-in">
          <h1 class="text-white fw-bold display-6">
            Welcome <span class="text-info">Back</span>
          </h1>
          <p class="text-secondary small">
            Please enter your details to sign in
          </p>
        </div>

        <div
          class="card border-0 shadow-lg rounded-4 overflow-hidden"
          style="
            background-color: #1b263b;
            border: 1px solid rgba(65, 90, 119, 0.4) !important;
          "
        >
          <div class="card-body p-4 p-md-5">
            <form (ngSubmit)="onLogin()" class="log-in_form">
              <div class="mb-4">
                <label
                  for="email"
                  class="form-label text-white-50 small fw-bold text-uppercase ls-1"
                  >Email or Nickname</label
                >
                <div class="input-group">
                  <span
                    class="input-group-text bg-black bg-opacity-20 border-0 text-info"
                  >
                    <i class="fa-solid fa-user"></i>
                  </span>
                  <input
                    id="email"
                    class="form-control bg-black bg-opacity-20 border-0 text-white py-2 custom-input"
                    type="email"
                    placeholder="Enter email or nickname"
                    name="email"
                    [(ngModel)]="data.email"
                    required
                  />
                </div>
              </div>

              <div class="mb-4">
                <label
                  for="password"
                  class="form-label text-white-50 small fw-bold text-uppercase ls-1"
                  >Password</label
                >
                <div class="input-group">
                  <span
                    class="input-group-text bg-black bg-opacity-20 border-0 text-info"
                  >
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input
                    id="password"
                    class="form-control bg-black bg-opacity-20 border-0 text-white py-2 custom-input"
                    type="password"
                    placeholder="••••••••"
                    name="password"
                    [(ngModel)]="data.password"
                    (ngModelChange)="onPasswordChange($event)"
                    required
                  />
                </div>
              </div>

              @if (errorMessage) {
              <div
                class="alert alert-danger py-2 border-0 bg-danger bg-opacity-10 text-danger small mb-4 animate-shake"
              >
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                {{ errorMessage }}
              </div>
              }

              <button
                type="submit"
                class="btn btn-info w-100 rounded-pill py-2 fw-bold shadow-sm mb-3 mt-2"
                [disabled]="!isFormValid() || isLoading"
              >
                @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Logging in... } @else { LOG IN }
              </button>

              <p class="text-center text-secondary small mb-0 mt-4">
                Not registered yet?
                <a
                  (click)="regester()"
                  class="text-info text-decoration-none fw-bold cursor-pointer hover-underline"
                >
                  Register here
                </a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
